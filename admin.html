<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Silfver Design</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

    <div id="login-container" class="login-wrapper">
        <div class="login-box">
            <h2>Silfver Admin</h2>
            <p>Enter credentials to access the store dashboard.</p>
            <form id="admin-login-form">
                <input type="text" id="admin-user" placeholder="Username" required>
                <input type="password" id="admin-pass" placeholder="Password" required>
                <p id="login-error" style="color: #ef4444; font-size: 0.875rem; display: none; margin-bottom: 16px;">Invalid credentials. Try again.</p>
                <button type="submit" class="btn-primary" style="width: 100%;">Log In</button>
            </form>
            <a href="index.html" class="back-link">← Back to Store</a>
        </div>
    </div>

    <div id="admin-dashboard" class="dashboard-wrapper" style="display: none;">
        <nav class="admin-nav">
            <div class="admin-logo">SILFVER DASHBOARD</div>
            <button id="btn-logout" class="btn-secondary btn-sm">Log Out</button>
        </nav>
        
        <main class="admin-main">
            <header class="admin-header">
                <div>
                    <h1>Products</h1>
                    <p>Manage your digital catalog. Changes reflect immediately across Silfver Design.</p>
                </div>
                <button id="btn-add-product" class="btn-primary">+ New Product</button>
            </header>

            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
