<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura UI Kit | Aura</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav id="navbar" class="glass-nav">
        <div class="nav-content">
            <a href="index.html" class="logo">AURA</a>
            <button class="btn-primary">Bag (0)</button>
        </div>
    </nav>

    <main class="product-page fade-up">
        <!-- Left: Gallery -->
        <div class="product-gallery">
            <div class="main-image">
                <img src="https://images.unsplash.com/photo-1618761714954-0b8cd0026356?q=80&w=2070&auto=format&fit=crop" alt="Aura UI Kit">
            </div>
            <div class="sub-images">
                <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?q=80&w=2000&auto=format&fit=crop" alt="Detail 1">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000&auto=format&fit=crop" alt="Detail 2">
            </div>
        </div>

        <!-- Right: Sticky Details -->
        <div class="product-details">
            <div class="sticky-sidebar">
                <h1>Aura UI Kit</h1>
                <p class="product-price">$49.00</p>
                <p class="product-desc">A comprehensive design system engineered for perfection. Includes over 200 meticulously crafted components, built for Framer and Figma.</p>
                
                <ul class="features-list">
                    <li><span>Format</span> <span>.fig, .framer</span></li>
                    <li><span>File Size</span> <span>124 MB</span></li>
                    <li><span>Updates</span> <span>Lifetime Free</span></li>
                </ul>

                <button class="btn-primary full-width">Purchase and Download</button>
                <p class="secure-text">Secure payment powered by Stripe.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
